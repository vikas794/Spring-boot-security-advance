spring:
  application:
    name: security-learning-platform
  datasource:
    url: jdbc:h2:mem:securitydb
    driverClassName: org.h2.Driver
    username: sa
    password: ${DB_PASSWORD:default_password_in_dev}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

# Modular Security Configuration
security:
  modules:
    jwt:
      enabled: true
      secret: ${JWT_SECRET:413F4428472B4B6250655368566D5970337336763979244226452948404D6351} # Use strong base64 secret in prod
      expiration: 3600000 # 1 hour
    session:
      enabled: false
    oauth2:
      enabled: false
    ldap:
      enabled: false
    mfa:
      enabled: false
    rate-limit:
      enabled: true
      capacity: 10
      refill-tokens: 10
      refill-duration-seconds: 60
    cors:
      enabled: true
    csrf:
      enabled: false # Typically disabled for stateless API

logging:
  level:
    org.springframework.security: DEBUG
    com.example.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
